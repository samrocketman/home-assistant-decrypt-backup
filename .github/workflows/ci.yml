name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      go_changed: ${{ steps.changes.outputs.go_changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '\.go$|go\.mod$|go\.sum$'; then
            echo "go_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "go_changed=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-changes
    if: needs.check-changes.outputs.go_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run tests
        run: make ci
      - name: Test report
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Goss Tests
          path: test-results/goss-report.xml
          reporter: java-junit

  lint:
    needs: check-changes
    if: needs.check-changes.outputs.go_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Lint
        run: |
          make lint
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::go fmt produced changes; please run 'make lint' locally"
            git diff --name-only
            exit 1
          fi

  pr-build:
    needs: [check-changes, test, lint]
    if: |
      needs.check-changes.outputs.go_changed == 'true' &&
      needs.test.result == 'success' &&
      needs.lint.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          install-only: true
      - name: Build snapshot
        run: make release-snapshot
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hassio-tar-binaries
          path: dist/hassio-tar-*
