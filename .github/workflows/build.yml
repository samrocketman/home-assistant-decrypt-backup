name: Build and Test

on:
  push:
    tags:
      - "*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      go_changed: ${{ steps.changes.outputs.go_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '\.go$|go\.mod$|go\.sum$'; then
            echo "go_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "go_changed=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-changes
    if: |
      always() &&
      (github.event_name == 'push' ||
       needs.check-changes.outputs.go_changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: make test

  lint:
    needs: check-changes
    if: |
      always() &&
      (github.event_name == 'push' ||
       needs.check-changes.outputs.go_changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Lint
        run: |
          make lint
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::go fmt produced changes; please run 'make lint' locally"
            git diff --name-only
            exit 1
          fi

  pr-build:
    needs: [check-changes, test, lint]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.check-changes.outputs.go_changed == 'true' &&
      needs.test.result == 'success' &&
      needs.lint.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
      - name: Build snapshot
        run: make release-snapshot
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hassio-tar-binaries
          path: dist/hassio-tar-*

  release:
    needs: [test, lint]
    if: |
      always() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.test.result == 'success' &&
      needs.lint.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
